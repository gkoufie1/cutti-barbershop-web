name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── BUILD & PUSH ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── DEPLOY ────────────────────────────────────────────
  # Secrets required in GitHub → Settings → Secrets → Actions:
  #   SERVER_HOST     — VPS IP or hostname
  #   SERVER_USER     — SSH username (e.g. ubuntu)
  #   SERVER_SSH_KEY  — full private key (-----BEGIN ... -----)
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY:       ${{ secrets.SERVER_SSH_KEY }}
          HOST:          ${{ secrets.SERVER_HOST }}
          USER:          ${{ secrets.SERVER_USER }}
          IMAGE:         ghcr.io/${{ github.repository }}:latest
          GITHUB_ACTOR:  ${{ github.actor }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SSH="ssh -i $KEY_FILE -o StrictHostKeyChecking=no"
          SCP="scp -i $KEY_FILE -o StrictHostKeyChecking=no"

          # Ensure target directory exists
          $SSH "$USER@$HOST" "mkdir -p /opt/cuttiworld"

          # Copy production compose file and nginx config
          $SCP nginx.conf docker-compose.prod.yml "$USER@$HOST:/opt/cuttiworld/"

          # Log in to registry
          $SSH "$USER@$HOST" "echo '$GITHUB_TOKEN' | docker login ghcr.io -u '$GITHUB_ACTOR' --password-stdin"

          # Pull latest image
          $SSH "$USER@$HOST" "cd /opt/cuttiworld && WEB_IMAGE='$IMAGE' docker compose -f docker-compose.prod.yml pull web"

          # Restart web container only (db and nginx keep running)
          $SSH "$USER@$HOST" "cd /opt/cuttiworld && WEB_IMAGE='$IMAGE' docker compose -f docker-compose.prod.yml up -d --no-deps web"

          # Start db and nginx if not already running
          $SSH "$USER@$HOST" "cd /opt/cuttiworld && WEB_IMAGE='$IMAGE' docker compose -f docker-compose.prod.yml up -d"

          # Clean up old images
          $SSH "$USER@$HOST" "docker image prune -f"

          rm -f "$KEY_FILE"
