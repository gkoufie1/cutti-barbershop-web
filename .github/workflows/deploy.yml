name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── BUILD & PUSH ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── DEPLOY ────────────────────────────────────────────
  # Secrets required in GitHub → Settings → Secrets → Actions:
  #   SERVER_HOST     — VPS IP or hostname
  #   SERVER_USER     — SSH username (e.g. ubuntu)
  #   SERVER_SSH_KEY  — full private key (-----BEGIN ... -----)
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write key to temp file
          KEY_FILE=$(mktemp)
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          # Copy nginx config to server
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=no \
            nginx.conf "$USER@$HOST:/opt/cuttiworld/nginx.conf"

          # Deploy
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$USER@$HOST" bash << ENDSSH
            set -e
            mkdir -p /opt/cuttiworld && cd /opt/cuttiworld

            cat > docker-compose.yml << 'EOF'
            services:
              web:
                image: ${IMAGE}
                restart: unless-stopped
                env_file: .env
                expose:
                  - "5000"
              nginx:
                image: nginx:1.27-alpine
                restart: unless-stopped
                ports:
                  - "80:80"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - web
            EOF

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker compose pull web
            docker compose up -d --no-deps web
            docker image prune -f
          ENDSSH

          rm -f "$KEY_FILE"
